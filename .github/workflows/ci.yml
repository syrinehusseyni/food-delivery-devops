name: Food Delivery Microservices CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# =========================
# GHCR PERMISSIONS (IMPORTANT)
# =========================
permissions:
  contents: read
  packages: write
  id-token: write

# =========================
# GLOBAL VARIABLES
# =========================
env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: adalisiwar

jobs:

  # ============================================
  # USER SERVICE
  # ============================================
  user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: backend/user-service
        run: mvn clean package -DskipTests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t $REGISTRY/$IMAGE_OWNER/user-service:latest backend/user-service

      - name: Push Docker Image
        run: docker push $REGISTRY/$IMAGE_OWNER/user-service:latest


  # ============================================
  # ORDER SERVICE
  # ============================================
  order-service:
    runs-on: ubuntu-latest
    steps:
