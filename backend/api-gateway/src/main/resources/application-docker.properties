# ============================================
# API Gateway - Docker Profile
# ============================================

spring.application.name=api-gateway

# Server configuration
server.port=9000
server.servlet.context-path=/
server.forward-headers-strategy=framework

# Eureka configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
spring.cloud.discovery.enabled=true

# Gateway CORS configuration - allow frontend
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost,http://frontend
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# JWT configuration (can be overridden by env vars)
jwt.secret=${JWT_SECRET:b8f1339f-bb76-4d62-abd9-4adde208ee3f}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Logging
logging.level.root=INFO
logging.level.com.example.api_gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Gateway response buffering
spring.cloud.gateway.filter.remove-hop-by-hop.enabled=true
spring.webflux.multipart.max-in-memory-size=16MB
spring.webflux.multipart.max-disk-usage-per-part=50MB
