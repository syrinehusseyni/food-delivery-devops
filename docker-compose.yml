services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: fooddelivery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fooddelivery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # pgAdmin - Database Management UI
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fooddelivery-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - fooddelivery-network
    depends_on:
      - postgres

  # ============================================
  # Eureka Server - Service Registry
  # ============================================
  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    container_name: fooddelivery-eureka
    restart: unless-stopped
    ports:
      - "${EUREKA_PORT}:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8761
    networks:
      - fooddelivery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # API Gateway
  # ============================================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: fooddelivery-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    networks:
      - fooddelivery-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ============================================
  # User Service
  # ============================================
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: fooddelivery-user-service
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT}:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - fooddelivery-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ============================================
  # Restaurant Service
  # ============================================
  restaurant-service:
    build:
      context: ./backend/restaurant-service
      dockerfile: Dockerfile
    container_name: fooddelivery-restaurant-service
    restart: unless-stopped
    ports:
      - "${RESTAURANT_SERVICE_PORT}:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - fooddelivery-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ============================================
  # Delivery Service
  # ============================================
  delivery-service:
    build:
      context: ./backend/delivery-service
      dockerfile: Dockerfile
    container_name: fooddelivery-delivery-service
    restart: unless-stopped
    ports:
      - "${DELIVERY_SERVICE_PORT}:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - fooddelivery-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ============================================
  # Order Service
  # ============================================
  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    container_name: fooddelivery-order-service
    restart: unless-stopped
    ports:
      - "${ORDER_SERVICE_PORT}:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - fooddelivery-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ============================================
  # Admin Service
  # ============================================
  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile
    container_name: fooddelivery-admin-service
    restart: unless-stopped
    ports:
      - "${ADMIN_SERVICE_PORT}:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - fooddelivery-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ============================================
  # Frontend (React + Vite)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fooddelivery-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - VITE_API_BASE_URL=http://api-gateway:9000
    networks:
      - fooddelivery-network
    depends_on:
      - api-gateway

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  fooddelivery-network:
    driver: bridge
